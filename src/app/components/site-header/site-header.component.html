<header id="global-header" class="code-section bg-white shadow-md sticky top-0 z-50">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between">
      <a routerLink="" class="flex items-center">
        <img
          [ngSrc]="'assets/galeb_logo_staro.jpg'"
          width="1011"
          height="239"
          alt="АД Галеб Logo"
          class="h-28 py-2 w-auto">
      </a>

      <div class="flex items-center gap-4">
        <nav class="hidden lg:flex items-center space-x-8">
          <button
            (click)="bookTicket()"
            class="bg-[var(--primary-color)] text-white px-5 py-2 rounded-full font-medium shadow-sm hover:brightness-90 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-pointer"
            i18n="@@navBookTicket">
            Резервирај билет
          </button>

          <a
            routerLink="about"
            class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium"
            i18n="@@navAbout">
            За Нас
          </a>

          <a
            routerLink="trips"
            class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium"
            i18n="@@navRoutes">
            Релации
          </a>

          <a
            routerLink="trips-local"
            class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium"
            i18n="@@navLocalRoutes">
            Локални релации
          </a>

          <a
            routerLink="contact"
            class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium"
            i18n="@@navContact">
            Контакт
          </a>
        </nav>

        <div class="pt-2 lg:pt-0">
          <div class="relative w-fit">
            <button
              type="button"
              class="flex items-center gap-2 rounded-full border border-[var(--primary-color)]/20 bg-[var(--primary-color)]/10 px-3 py-2 text-sm font-semibold text-[var(--dark-text-color)] shadow-sm transition-all duration-200 hover:bg-[var(--primary-color)]/15"
              (click)="toggleLanguageMenu()"
              [attr.aria-expanded]="isLanguageMenuOpen"
              aria-haspopup="menu"
              aria-label="Select language">
              <img
                [ngSrc]="currentLocaleOption.flagSrc"
                width="24"
                height="24"
                [alt]="currentLocaleOption.name"
                class="h-6 w-6 rounded-full object-cover ring-1 ring-black/10">
              <i
                class="fas fa-chevron-down text-[10px] text-[var(--dark-text-color)]/60 transition-transform duration-200"
                [ngClass]="isLanguageMenuOpen ? 'rotate-180' : ''"></i>
            </button>

            <div
              class="absolute right-0 mt-2 w-48 overflow-hidden rounded-2xl border border-[var(--primary-color)]/10 bg-white py-2 shadow-xl z-50"
              [class.hidden]="!isLanguageMenuOpen"
              role="menu">
              @for (locale of locales; track locale.code) {
                <button
                  type="button"
                  class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm transition-colors hover:bg-[var(--primary-color)]/10"
                  [ngClass]="currentLocale === locale.code ? 'font-semibold text-[var(--primary-color)]' : 'text-[var(--dark-text-color)]'"
                  (click)="switchLocale(locale.code); closeMobileMenu()"
                  [attr.aria-label]="locale.ariaLabel"
                  role="menuitem">
                  <img
                    [ngSrc]="locale.flagSrc"
                    width="24"
                    height="24"
                    [alt]="locale.name"
                    class="h-6 w-6 rounded-full object-cover ring-1 ring-black/10">
                  <span>{{ locale.name }}</span>
                </button>
              }
            </div>
          </div>
        </div>

        <button
          type="button"
          class="lg:hidden text-[var(--dark-text-color)] p-2"
          (click)="toggleMobileMenu()"
          [attr.aria-expanded]="isMobileMenuOpen"
          aria-label="Отвори мени"
          i18n-aria-label="@@navOpenMenuAria">
          <i class="fas fa-bars text-2xl"></i>
        </button>
      </div>
    </div>

    <nav class="lg:hidden pb-4" [class.hidden]="!isMobileMenuOpen">
      <div class="flex flex-col space-y-3 pt-4 border-t border-[var(--light-border-color)] mt-2">

        <button
          (click)="bookTicket(); closeMobileMenu()"
          class="bg-[var(--primary-color)] text-white px-5 py-2 rounded-md font-medium w-fit mb-2 shadow-sm hover:brightness-90 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-pointer"
          i18n="@@navBookTicket">
          Резервирај билет
        </button>

        <a
          routerLink="about"
          class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium py-2"
          (click)="closeMobileMenu()"
          i18n="@@navAbout">
          За Нас
        </a>

        <a
          routerLink="trips"
          class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium py-2"
          (click)="closeMobileMenu()"
          i18n="@@navRoutes">
          Релации
        </a>

        <a
          routerLink="trips-local"
          class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium py-2"
          (click)="closeMobileMenu()"
          i18n="@@navLocalRoutes">
          Локални релации
        </a>

        <a
          routerLink="contact"
          class="text-[var(--dark-text-color)] hover:text-[var(--primary-color)] transition-colors font-medium py-2"
          (click)="closeMobileMenu()"
          i18n="@@navContact">
          Контакт
        </a>
      </div>
    </nav>
  </div>
</header>
