<section
  class="code-section py-20 bg-gradient-to-br from-[var(--light-background-color)] to-white relative overflow-hidden"
  id="sxghxvk">
  <div class="absolute top-10 right-10 w-72 h-72 bg-[var(--primary-color)] rounded-full opacity-5 blur-3xl"></div>
  <div class="absolute bottom-10 left-10 w-96 h-96 bg-[var(--accent-color)] rounded-full opacity-5 blur-3xl"></div>

  <div class="container mx-auto px-4 relative z-10">
    <div class="text-center max-w-3xl mx-auto mb-16">
      <div class="inline-block bg-white text-[var(--primary-color)] px-4 py-2 rounded-full font-semibold text-sm mb-6 shadow-md">
        <i class="fas fa-map-marked-alt mr-2"></i>
        <span i18n="@@ourRoutesBadge">Нашите Релации</span>
      </div>

      <h2
        class="font-[var(--font-family-heading)] text-4xl sm:text-5xl font-bold text-[var(--dark-text-color)] mb-6">
        <span i18n="@@connectedWith">Поврзани Со</span>
        <span class="text-[var(--primary-color)]" i18n="@@allMacedonia"> Цела Македонија</span>
      </h2>

      <p class="text-lg text-[var(--gray-text-color)] leading-relaxed" i18n="@@routesSectionDescription">
        Од Охрид до секој главен град во земјата, плус меѓународни релации.
        Редовни поаѓања, удобни возила, професионална услуга.
      </p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
      <app-relation-card [relation]="SkopjeRelation" />
      <app-relation-card [relation]="SkopjeRelation" />
      <app-relation-card [relation]="SkopjeRelation" />
      <app-relation-card [relation]="SkopjeRelation" />
      <app-relation-card [relation]="SkopjeRelation" />
      <app-relation-card [relation]="BelgradeRelation" />
    </div>

    <div class="text-center">
      <a
        routerLink="trips"
        class="inline-flex items-center bg-[var(--primary-color)] text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-[var(--accent2-color)] transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
        <span i18n="@@routesCtaAllRoutes">Погледни сите релации, распоред и цени</span>
        <i class="fas fa-arrow-right ml-3"></i>
      </a>

      <p class="text-[var(--gray-text-color)] text-sm mt-4">
        <i class="fas fa-info-circle mr-1"></i>
        <span i18n="@@fixedTimetablesNote">Редовни линии со фиксни возни редови</span>
      </p>
    </div>
  </div>
</section>
